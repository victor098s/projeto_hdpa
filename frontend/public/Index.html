<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/styles.css" class="css" />
    <title>Login</title>
  </head>
  <body>
    <div class="left"></div>
    <div class="right">
      <div class="alignLogo">
        <div class="logo">
          <img src="./assets/img/logo.png" alt="logo" />
        </div>
      </div>

      <form class="LoginBox" id="loginForm">
        <h2>Acesse a plataforma</h2>

        <label class="label">
          E-mail
          <div class="inputImg">
            <img src="#" alt="email" />

            <input
            id="email"
              type="email"
              class="input"
              placeholder="Digite o seu e-mail"
            />
          </div>
        </label>

        <label class="label">
          Senha
          <div class="inputImg">
            <img src="#" alt="senha" />
            <input
            id="password"
              type="password"
              class="input"
              placeholder="Digite sua senha"
            />
          </div>
        </label>

        <input class="btnSubmit" type="submit" placeholder="ENTRAR" />
    </form>
    </div>
    <script src="../app.js"></script>
  </body>
</html>
